<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>First-run Setup — Tardiness Check</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <main class="container narrow" style="padding-top: 48px;">
    <div style="text-align: center; margin-bottom: 24px;">
      <div style="width: 64px; height: 64px; border-radius: 16px; background: linear-gradient(135deg, var(--c-brand), #7c3aed); display: inline-flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 24px; box-shadow: var(--shadow-md);">TC</div>
      <h1 style="margin-top: 16px;">Welcome to Tardiness Check</h1>
      <p class="muted">Let's set things up. This only takes a minute.</p>
    </div>

    <div class="wizard-progress" id="progress">
      <div class="step" data-step="1"></div>
      <div class="step" data-step="2"></div>
      <div class="step" data-step="3"></div>
      <div class="step" data-step="4"></div>
    </div>

    <div id="wizard-content" class="card fade-in"></div>
  </main>

  <div id="footer-mount"></div>

  <script src="/js/common.js"></script>
  <script>
    let currentStep = 1;
    const data = { school_name: '', academic_year: '', pin: '', recovery_code: null };

    async function init() {
      try {
        document.getElementById('footer-mount').replaceWith(Layout.renderFooter());
        const status = await API.get('/api/wizard/status');
        if (status.completed) { window.location.href = '/'; return; }
        if (status.has_school) data.school_name = (await API.get('/api/config')).school_name || '';
        if (status.has_year) data.academic_year = (await API.get('/api/config')).academic_year || '';
        if (status.has_school) currentStep = 2;
        if (status.has_year) currentStep = 3;
        if (status.has_pin) currentStep = 4;
        render();
      } catch (e) {
        toast({ message: 'Could not load wizard status: ' + e.message, type: 'error' });
      }
    }

    function render() {
      updateProgress();
      const c = document.getElementById('wizard-content');
      c.classList.remove('fade-in');
      void c.offsetWidth;  // restart animation
      c.classList.add('fade-in');
      if (currentStep === 1) renderStep1(c);
      else if (currentStep === 2) renderStep2(c);
      else if (currentStep === 3) renderStep3(c);
      else if (currentStep === 4) renderStep4(c);
    }

    function updateProgress() {
      document.querySelectorAll('.wizard-progress .step').forEach(el => {
        const s = parseInt(el.dataset.step, 10);
        el.classList.remove('done', 'current');
        if (s < currentStep) el.classList.add('done');
        else if (s === currentStep) el.classList.add('current');
      });
    }

    function stepHeader(iconName, title, subtitle) {
      return `
        <div class="wizard-step-icon">${icon(iconName, 36)}</div>
        <h2 style="text-align: center; margin-bottom: 8px;">${title}</h2>
        <p class="muted" style="text-align: center; margin-bottom: 20px;">${subtitle}</p>
      `;
    }

    // ===== Step 1: School name =====
    function renderStep1(c) {
      c.innerHTML = `
        ${stepHeader('school', 'What\'s your school called?', 'This appears in the top bar of every page.')}
        <label>School name</label>
        <input id="school" type="text" value="${escapeHtml(data.school_name)}" placeholder="e.g. Elyon Christian Primary School" autofocus>
        <div class="modal-actions" style="justify-content: flex-end;">
          <button class="primary big" id="next">Next ${icon('chevronRight', 16)}</button>
        </div>
      `;
      document.getElementById('school').focus();
      document.getElementById('next').addEventListener('click', async () => {
        const v = document.getElementById('school').value.trim();
        if (!v) return toast({ message: 'Please enter a school name', type: 'error' });
        data.school_name = v;
        try {
          await API.post('/api/wizard/step/school', { school_name: v });
          currentStep = 2; render();
        } catch (e) { toast({ message: e.message, type: 'error' }); }
      });
      document.getElementById('school').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('next').click();
      });
    }

    // ===== Step 2: Academic year =====
    function renderStep2(c) {
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth();
      const startYear = m >= 6 ? y : y - 1;
      const suggestions = [];
      for (let i = -1; i <= 2; i++) {
        suggestions.push(`${startYear + i}/${startYear + i + 1}`);
      }
      c.innerHTML = `
        ${stepHeader('calendar', 'What academic year is it?', 'Format: YYYY/YYYY (e.g. ${suggestions[1]})')}
        <div class="wizard-options" id="year-options">
          ${suggestions.map(y => `<div class="wizard-option" data-year="${y}">${y}</div>`).join('')}
        </div>
        <label style="margin-top: 16px;">Or type a custom year</label>
        <input id="year" type="text" value="${escapeHtml(data.academic_year || suggestions[1])}" placeholder="YYYY/YYYY" pattern="\\d{4}/\\d{4}">
        <div class="modal-actions" style="justify-content: space-between;">
          <button id="back">${icon('chevronRight', 16).replace('polyline points="9 18 15 12 9 6"', 'polyline points="15 18 9 12 15 6"')} Back</button>
          <button class="primary big" id="next">Next ${icon('chevronRight', 16)}</button>
        </div>
      `;
      document.querySelectorAll('#year-options .wizard-option').forEach(el => {
        el.addEventListener('click', () => {
          document.querySelectorAll('.wizard-option').forEach(o => o.classList.remove('selected'));
          el.classList.add('selected');
          document.getElementById('year').value = el.dataset.year;
        });
        if (el.dataset.year === (data.academic_year || suggestions[1])) el.classList.add('selected');
      });
      document.getElementById('back').addEventListener('click', () => { currentStep = 1; render(); });
      document.getElementById('next').addEventListener('click', async () => {
        const v = document.getElementById('year').value.trim();
        if (!/^\d{4}\/\d{4}$/.test(v)) return toast({ message: 'Use format YYYY/YYYY (e.g. 2025/2026)', type: 'error' });
        data.academic_year = v;
        try {
          await API.post('/api/wizard/step/year', { academic_year: v });
          currentStep = 3; render();
        } catch (e) { toast({ message: e.message, type: 'error' }); }
      });
    }

    // ===== Step 3: PIN =====
    function renderStep3(c) {
      c.innerHTML = `
        ${stepHeader('lock', 'Create an admin PIN', 'You\'ll enter this PIN when adding students, changing settings, or making backups.')}
        <label>New PIN (4–8 digits)</label>
        <input id="pin" type="password" inputmode="numeric" pattern="\\d{4,8}" maxlength="8" autofocus class="huge center">
        <label style="margin-top: 12px;">Confirm PIN</label>
        <input id="pin2" type="password" inputmode="numeric" pattern="\\d{4,8}" maxlength="8" class="huge center">
        <div class="modal-actions" style="justify-content: space-between;">
          <button id="back">${icon('chevronRight', 16).replace('polyline points="9 18 15 12 9 6"', 'polyline points="15 18 9 12 15 6"')} Back</button>
          <button class="primary big" id="next">Next ${icon('chevronRight', 16)}</button>
        </div>
      `;
      document.getElementById('pin').focus();
      document.getElementById('back').addEventListener('click', () => { currentStep = 2; render(); });
      document.getElementById('next').addEventListener('click', async () => {
        const pin = document.getElementById('pin').value;
        const pin2 = document.getElementById('pin2').value;
        if (pin !== pin2) return toast({ message: 'PINs do not match', type: 'error' });
        try {
          const res = await API.post('/api/wizard/step/pin', { pin, pin_confirm: pin2 });
          data.recovery_code = res.recovery_code;
          data.pin = pin;
          currentStep = 4; render();
        } catch (e) {
          toast({ message: e.message || 'Could not set PIN', type: 'error' });
        }
      });
    }

    // ===== Step 4: Recovery code + Finish =====
    function renderStep4(c) {
      c.innerHTML = `
        ${stepHeader('shield', 'Save your recovery code', 'This is the ONLY way to reset your PIN if you forget it.')}
        <p class="muted" style="text-align: center; margin-bottom: 12px;">Write it down, print it, or save it somewhere safe. We will only show it this one time.</p>
        <div class="recovery-code">${escapeHtml(data.recovery_code)}</div>
        <p class="muted" style="text-align: center; margin-top: 20px;">You can add students now, or do it later from the Roster page.</p>
        <div class="modal-actions" style="justify-content: space-between; flex-wrap: wrap; gap: 12px;">
          <button id="skip">Skip — add students later</button>
          <button id="download" class="primary big">${icon('download', 16)} Download template + finish</button>
        </div>
      `;
      document.getElementById('skip').addEventListener('click', async () => { await finishWizard(); });
      document.getElementById('download').addEventListener('click', async () => {
        window.location.href = '/api/template?format=xlsx';
        await finishWizard();
      });
    }

    async function finishWizard() {
      try {
        await API.post('/api/wizard/complete');
        Auth.setPin(data.pin);
        toast({ message: 'Setup complete! Welcome aboard.', type: 'success', duration: 3000 });
        setTimeout(() => { window.location.href = '/'; }, 800);
      } catch (e) {
        toast({ message: 'Could not finish wizard: ' + e.message, type: 'error' });
      }
    }

    init();
  </script>
</body>
</html>
