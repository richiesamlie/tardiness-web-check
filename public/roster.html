<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roster — Tardiness Check</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="topbar-mount"></div>

  <main class="container wide">
    <div class="page-header">
      <div>
        <h2>Students</h2>
        <div class="subtitle" id="subtitle">Loading…</div>
      </div>
      <div class="row">
        <button id="btn-import"><span>Import</span></button>
        <button id="btn-export"><span>Export</span></button>
        <button id="btn-add" class="primary"><span>Add student</span></button>
      </div>
    </div>

    <div class="row" style="margin-bottom: 16px;">
      <div class="search-input" style="max-width: 360px;">
        <span class="icon" id="search-icon"></span>
        <input id="search" type="search" placeholder="Search by name or ID…">
      </div>
      <select id="class-filter" style="max-width: 240px;">
        <option value="">All classes</option>
      </select>
      <span class="spacer"></span>
      <span id="count" class="muted"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Class</th>
            <th style="width: 110px;">Late count</th>
            <th style="width: 140px; text-align: right;">Actions</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div id="pagination" class="row between" style="margin-top: 16px;"></div>
  </main>

  <div id="footer-mount"></div>

  <script src="/js/common.js"></script>
  <script>
    let students = [];
    let page = 1;
    const limit = 50;

    async function init() {
      const ok = await Auth.pingPin();
      if (!ok) { window.location.href = '/login.html?next=roster.html'; return; }

      try {
        document.getElementById('search-icon')?.insertAdjacentHTML('afterbegin', icon('search', 18));
        const config = await API.get('/api/config');
        const backup = await API.get('/api/health').then(h => h.backup).catch(() => null);
        const topbar = Layout.renderTopbar({ active: 'roster', schoolName: config.school_name, backup });
        const mount = document.getElementById('topbar-mount');
        if (mount) {
          mount.replaceWith(topbar);
        } else {
          document.body.prepend(topbar);
        }
        topbar.id = 'topbar-mount';

        // Inject icons into buttons (no-op if already present)
        const ensureIcon = (id, svg) => {
          const btn = document.getElementById(id);
          if (btn && !btn.querySelector('svg')) {
            btn.insertAdjacentHTML('afterbegin', svg);
          }
        };
        ensureIcon('btn-import', icon('upload', 16));
        ensureIcon('btn-export', icon('download', 16));
        ensureIcon('btn-add', icon('plus', 16));
        // Add chevron to export button
        const exp = document.getElementById('btn-export');
        if (exp && !exp.querySelector('.chevron')) {
          exp.insertAdjacentHTML('beforeend', ' ' + icon('chevronDown', 12).replace('<svg ', '<svg class="chevron" '));
        }
      } catch (e) { console.error('[roster init]', e); }
      const footerMount = document.getElementById('footer-mount');
      if (footerMount) footerMount.replaceWith(Layout.renderFooter());

      document.getElementById('search')?.addEventListener('input', () => { page = 1; load(); });
      document.getElementById('class-filter')?.addEventListener('change', () => { page = 1; load(); });
      document.getElementById('btn-add')?.addEventListener('click', openAddModal);
      document.getElementById('btn-import')?.addEventListener('click', openImportModal);
      const btnExport = document.getElementById('btn-export');
      if (btnExport) btnExport.addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('export-menu')?.classList.toggle('hidden');
      });
      document.addEventListener('click', () => document.getElementById('export-menu')?.classList.add('hidden'));
      document.getElementById('export-menu')?.addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-fmt]');
        if (!btn) return;
        doExport(btn.dataset.scope || 'students', btn.dataset.fmt);
      });

      // Build export menu
      const menu = document.createElement('div');
      menu.id = 'export-menu';
      menu.className = 'card hidden';
      menu.style.cssText = 'position: absolute; right: 0; top: 100%; margin-top: 4px; padding: 4px; min-width: 220px; z-index: 100;';
      menu.innerHTML = `
        <button class="ghost" style="display: block; width: 100%; text-align: left;" data-fmt="xlsx">${icon('download', 14)} Students → Excel (.xlsx)</button>
        <button class="ghost" style="display: block; width: 100%; text-align: left;" data-fmt="csv">${icon('download', 14)} Students → CSV (.csv)</button>
        <hr style="margin: 4px 0; border: none; border-top: 1px solid var(--c-border);">
        <button class="ghost" style="display: block; width: 100%; text-align: left;" data-scope="tardiness" data-fmt="xlsx">${icon('download', 14)} Tardiness events → Excel</button>
        <button class="ghost" style="display: block; width: 100%; text-align: left;" data-scope="tardiness" data-fmt="csv">${icon('download', 14)} Tardiness events → CSV</button>
      `;
      const exportParent = document.getElementById('btn-export')?.parentElement;
      if (exportParent) exportParent.appendChild(menu);

      try { await loadClasses(); } catch (e) { console.error('[roster loadClasses]', e); }
      try { await load(); } catch (e) { console.error('[roster load]', e); }
    }

    async function loadClasses() {
      try {
        const res = await API.get('/api/students?limit=500');
        const classes = [...new Set(res.items.map(s => s.class))].sort();
        const sel = document.getElementById('class-filter');
        for (const c of classes) {
          const opt = document.createElement('option');
          opt.value = c;
          opt.textContent = c;
          sel.appendChild(opt);
        }
      } catch {}
    }

    async function load() {
      const search = document.getElementById('search').value.trim();
      const cls = document.getElementById('class-filter').value;
      const params = new URLSearchParams({ page, limit });
      if (search) params.set('search', search);
      if (cls) params.set('class', cls);

      const res = await Auth.authedRequest('GET', `/api/students?${params}`);
      students = res.items;
      document.getElementById('count').textContent = `${res.total} student${res.total === 1 ? '' : 's'}`;
      document.getElementById('subtitle').textContent = res.total === 0
        ? 'No students yet — add some to get started.'
        : `${res.total} student${res.total === 1 ? '' : 's'} across ${new Set(res.items.map(s => s.class)).size} class${new Set(res.items.map(s => s.class)).size === 1 ? '' : 'es'}`;
      render();

      const totalPages = Math.max(1, Math.ceil(res.total / limit));
      const pg = document.getElementById('pagination');
      pg.innerHTML = `
        <button id="prev" ${page <= 1 ? 'disabled' : ''}>${icon('arrowLeft', 14)} Prev</button>
        <span class="muted">Page ${page} of ${totalPages}</span>
        <button id="next" ${page >= totalPages ? 'disabled' : ''}>Next ${icon('arrowRight', 14)}</button>
      `;
      pg.querySelector('#prev').addEventListener('click', () => { page--; load(); });
      pg.querySelector('#next').addEventListener('click', () => { page++; load(); });
    }

    function render() {
      const tbody = document.getElementById('tbody');
      if (!students.length) {
        tbody.innerHTML = '';
        const empty = emptyState({
          icon: 'users',
          title: 'No students yet',
          message: 'Add students one at a time, or import an Excel/CSV file with your roster.',
          action: { label: 'Add student', icon: 'plus', onClick: openAddModal },
        });
        tbody.appendChild(empty.firstElementChild || empty);
        // Better: append to tbody container not row; use a single row
        tbody.innerHTML = `<tr><td colspan="4" style="padding: 0;"><div class="empty-state"></div></tr>`;
        tbody.querySelector('.empty-state').appendChild(empty);
        // Reset: just inline
        tbody.innerHTML = `<tr><td colspan="4" style="padding: 0; border: none;">
          <div class="empty-state" style="padding: 56px 24px;">
            <div class="empty-icon">${icon('users', 32)}</div>
            <h3>No students yet</h3>
            <p>Add students one at a time, or import an Excel/CSV file with your roster.</p>
            <button class="primary" id="empty-add">${icon('plus', 16)} Add student</button>
          </div>
        </td></tr>`;
        tbody.querySelector('#empty-add').addEventListener('click', openAddModal);
        return;
      }
      tbody.innerHTML = students.map(s => {
        const cc = classColor(s.class);
        const initial = (s.full_name || '?').trim().charAt(0).toUpperCase();
        return `
          <tr>
            <td>
              <div class="row" style="gap: 12px;">
                <div class="avatar" style="background:${cc}; width: 36px; height: 36px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0;">${escapeHtml(initial)}</div>
                <div>
                  <div style="font-weight: 600;">${escapeHtml(s.full_name)}</div>
                  <div class="muted" style="font-size: 12px;"><code>${escapeHtml(s.student_id)}</code></div>
                </div>
              </div>
            </td>
            <td>${escapeHtml(s.class)}</td>
            <td>${lateBadge(s.late_count)}</td>
            <td>
              <div class="row-actions" style="justify-content: flex-end;">
                <button class="ghost icon-only btn-edit" data-id="${s.id}" title="Edit">${icon('pencil', 16)}</button>
                <button class="ghost icon-only btn-del" data-id="${s.id}" data-name="${escapeHtml(s.full_name)}" title="Delete" style="color: var(--c-danger);">${icon('trash', 16)}</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
      tbody.querySelectorAll('.btn-edit').forEach(b => b.addEventListener('click', () => openEditModal(parseInt(b.dataset.id, 10))));
      tbody.querySelectorAll('.btn-del').forEach(b => b.addEventListener('click', () => doDelete(parseInt(b.dataset.id, 10), b.dataset.name)));
    }

    function openAddModal() { openStudentModal(null); }
    function openEditModal(id) {
      const s = students.find(x => x.id === id);
      if (s) openStudentModal(s);
    }

    function openStudentModal(existing) {
      const body = document.createElement('div');
      body.innerHTML = `
        <label>Student ID (school ID)</label>
        <input id="f-sid" value="${existing ? escapeHtml(existing.student_id) : ''}" ${existing ? 'disabled' : ''} placeholder="e.g. P5-2025-001">
        <label style="margin-top: 12px;">Full name</label>
        <input id="f-name" value="${existing ? escapeHtml(existing.full_name) : ''}" placeholder="e.g. Alex Tan">
        <label style="margin-top: 12px;">Class</label>
        <input id="f-class" value="${existing ? escapeHtml(existing.class) : ''}" placeholder="e.g. Primary 5A">
      `;
      showModal({
        title: existing ? 'Edit student' : 'Add student',
        body,
        actions: [
          { label: 'Cancel' },
          { label: existing ? 'Save' : 'Add', class: 'primary', onClick: async () => {
                const sid = (existing ? existing.student_id : document.getElementById('f-sid').value).trim();
                const name = document.getElementById('f-name').value.trim();
                const cls = document.getElementById('f-class').value.trim();
                if (!sid || !name || !cls) {
                  toast({ message: 'All fields are required', type: 'error' });
                  return false;  // keep modal open
                }
                try {
                  if (existing) {
                    await Auth.authedRequest('PUT', `/api/students/${existing.id}`, { full_name: name, class: cls });
                    toast({ message: 'Student updated', type: 'success' });
                  } else {
                    await Auth.authedRequest('POST', '/api/students', { student_id: sid, full_name: name, class: cls });
                    toast({ message: 'Student added', type: 'success' });
                  }
                  await load();
                } catch (e) {
                  toast({ message: e.message || 'Could not save student', type: 'error' });
                  return false;  // keep modal open so admin can fix
                }
              }},
            ],
          });
    }

    async function doDelete(id, name) {
      const ok = await confirmModal({
        title: 'Delete student?',
        message: `Delete "${name}"? Their tardiness history will be preserved (the student record is soft-deleted).`,
        confirmLabel: 'Delete',
        danger: true,
      });
      if (!ok) return;
      try {
        await Auth.authedRequest('DELETE', `/api/students/${id}`);
        toast({ message: 'Student deleted', type: 'success' });
        await load();
      } catch (e) {
        toast({ message: e.message, type: 'error' });
      }
    }

    async function doExport(scope, format) {
      const params = new URLSearchParams({ scope, format });
      const res = await fetch(`/api/export?${params}`, { headers: Auth.authHeaders() });
      if (!res.ok) return toast({ message: 'Export failed', type: 'error' });
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ext = format === 'csv' ? 'csv' : 'xlsx';
      const today = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `${scope}-${today}.${ext}`;
      a.click();
      URL.revokeObjectURL(url);
      toast({ message: `Exported ${scope} as ${format.toUpperCase()}`, type: 'success' });
    }

    function openImportModal() {
      const body = document.createElement('div');
      body.innerHTML = `
        <p>Upload a <strong>.xlsx</strong> or <strong>.csv</strong> file with your student list.</p>
        <p class="muted" style="font-size: 13px;">
          Need a template?
          <a href="/api/template?format=xlsx" target="_blank">${icon('download', 12)} Download Excel template</a> ·
          <a href="/api/template?format=csv" target="_blank">${icon('download', 12)} CSV template</a>
        </p>
        <input id="file" type="file" accept=".xlsx,.csv" style="margin-top: 12px;">
        <div id="preview-result" style="margin-top: 16px;"></div>
      `;
      const modal = showModal({
        title: 'Import students',
        body,
        actions: [
          { label: 'Cancel' },
          { label: 'Preview', class: 'primary', onClick: async () => {
            const file = document.getElementById('file').files[0];
            if (!file) throw new Error('Please choose a file');
            const fd = new FormData();
            fd.append('file', file);
            const res = await fetch('/api/import/preview', { method: 'POST', body: fd, headers: Auth.authHeaders() });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Preview failed');
            const r = document.getElementById('preview-result');
            r.innerHTML = `
              <div class="card" style="background: var(--c-surface-2); border: none; padding: 16px;">
                <div class="row" style="gap: 18px; margin-bottom: 10px;">
                  <div><div style="font-size: 22px; font-weight: 700; color: var(--c-success);">${data.summary.new_count}</div><div class="muted" style="font-size: 12px; text-transform: uppercase;">New</div></div>
                  <div><div style="font-size: 22px; font-weight: 700; color: var(--c-warning);">${data.summary.update_count}</div><div class="muted" style="font-size: 12px; text-transform: uppercase;">Updates</div></div>
                  <div><div style="font-size: 22px; font-weight: 700; color: ${data.summary.error_count ? 'var(--c-danger)' : 'var(--c-text-faint)'};">${data.summary.error_count}</div><div class="muted" style="font-size: 12px; text-transform: uppercase;">Errors</div></div>
                  <div class="spacer"></div>
                  <div class="muted" style="font-size: 13px; align-self: end;">of ${data.summary.total_rows} rows</div>
                </div>
                ${data.summary.error_count > 0 ? `<details style="margin-top: 8px;"><summary style="cursor: pointer; font-size: 13px;">Show ${data.errors.length} error${data.errors.length === 1 ? '' : 's'}</summary><ul style="font-size: 13px; max-height: 160px; overflow: auto; padding-left: 20px; margin-top: 8px;">${data.errors.map(e => `<li>Row ${e.row}: ${escapeHtml(e.reason)}</li>`).join('')}</ul></details>` : ''}
                <button class="primary big block" id="apply-btn" style="margin-top: 14px;" ${data.summary.new_count + data.summary.update_count === 0 ? 'disabled' : ''}>
                  Apply ${data.summary.new_count + data.summary.update_count} change${data.summary.new_count + data.summary.update_count === 1 ? '' : 's'}
                </button>
              </div>
            `;
            document.getElementById('apply-btn').addEventListener('click', async () => {
              try {
                const commit = await Auth.authedRequest('POST', '/api/import/commit', {
                  rows: [...data.new_students, ...data.updated_students.map(u => ({ student_id: u.student_id, full_name: u.new_full_name, class: u.new_class }))],
                });
                toast({ message: `Added ${commit.added}, updated ${commit.updated}`, type: 'success' });
                modal.close();
                await load();
              } catch (e) {
                toast({ message: e.message, type: 'error' });
              }
            });
            throw false;
          }},
        ],
      });
    }

    init();
  </script>
</body>
</html>
